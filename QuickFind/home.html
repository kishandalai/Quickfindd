<!-- 🌫 Overlay Content -->

<div class="container">
  <h2 style="text-align: center;">
Everything You Need, One QuickFind Away</h2>

<p style="text-align: center;">Discover and book trusted local services—from home repairs to essential needs—all in one place</p>
<p style="text-align: center;">Find trusted professionals near you and book instantly with QuickFind</p>
</div>
  
<script>
 
let currentSlide = 0;
const slides = document.querySelectorAll(".slide");

function showSlide(index) {
  slides.forEach((slide, i) => {
    slide.classList.toggle("active", i === index);
  });
}

function changeSlide(step) {
  currentSlide += step;

  if (currentSlide >= slides.length) currentSlide = 0;
  if (currentSlide < 0) currentSlide = slides.length - 1;

  showSlide(currentSlide);
}

/* Auto slide */
setInterval(() => {
  changeSlide(1);
}, 4000);
 const user = localStorage.getItem("loggedInUser");

if (!user) {
  window.location.href = "login.html";
}
</script>

</body>
