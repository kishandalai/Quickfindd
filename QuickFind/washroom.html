<body>

</div>

<nav>

</nav>

<div class="container services">

  <div class="card">
    <h3>Lokesh Cleaning</h3>
    <p>📞 9876543210</p>
    <button onclick="bookVendor('Lokesh Cleaning')">Book Now</button>
  </div>

  <div class="card">
    <h3>Express Cleaning</h3>
    <p>📞 9123456780</p>
    <button onclick="bookVendor('Express Cleaning')">Book Now</button>
  </div>

  <div class="card">
    <h3>QuickFix Washroom Cleaning</h3>
    <p>📞 9988776655</p>
    <button onclick="bookVendor('QuickFix Washroom Cleaning')">Book Now</button>
  </div>

  <div class="card">
    <h3>Local Washroom Experts</h3>
    <p>📞 9011223344</p>
    <button onclick="bookVendor('Local Washroom Experts')">Book Now</button>
  </div>

  <div class="card">
    <h3>Pro Washroom Cleaning</h3>
    <p>📞 9090909090</p>
    <button onclick="bookVendor('Pro Washroom Cleaning')">Book Now</button>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  collection,
  addDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyCq_Dv4urFsCenU1XbjYxPBbqvLHosT0bI",
  authDomain: "quickfind-a84be.firebaseapp.com",
  projectId: "quickfind-a84be",
  storageBucket: "quickfind-a84be.firebasestorage.app",
  messagingSenderId: "656239050854",
  appId: "1:656239050854:web:2f2c3a72eaa6b686fbada7",
  measurementId: "G-EQJ2VS6VRM"
};


const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


window.bookVendor = async function(vendorName)
{

  const user = auth.currentUser;

  if (!user)
  {
    alert("Please login first");
    window.location.href = "login.html";
    return;
  }

  try
  {

    const userRef = doc(db, "users", user.uid);
    const userSnap = await getDoc(userRef);

    const userData = userSnap.data();

    await addDoc(collection(db, "bookings"), {

      userId: user.uid,
      userEmail: userData.email,
      userName: userData.fullName,

      service: "Washroom Cleaning",
      vendor: vendorName,
      category: "home cleaning",

      status: "Pending",

      timestamp: serverTimestamp()

    });

    alert("Booked " + vendorName);

  }

  catch(error)
  {
    console.error(error);
    alert("Booking failed");
  }

}


</script>

</body>
</html>
