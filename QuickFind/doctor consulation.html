<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyCq_Dv4urFsCenU1XbjYxPBbqvLHosT0bI",
authDomain:"quickfind-a84be.firebaseapp.com",
projectId:"quickfind-a84be",
storageBucket:"quickfind-a84be.firebasestorage.app",
messagingSenderId:"656239050854",
appId:"1:656239050854:web:2f2c3a72eaa6b686fbada7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.bookVendor = async function(vendorName){

const user = auth.currentUser;

if(!user){
alert("Login required");
window.location.href="login.html";
return;
}

const userSnap = await getDoc(doc(db,"users",user.uid));
const userData = userSnap.data();

await addDoc(collection(db,"bookings"),{

userId:user.uid,
userEmail:userData.email,
userName:userData.fullName,

service:"Doctor Consultation",
vendor:vendorName,
category:"Medical",

status:"Pending",
timestamp:serverTimestamp()

});

alert("Booked "+vendorName);

}

</script>
